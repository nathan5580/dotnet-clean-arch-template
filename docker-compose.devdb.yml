services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: template-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Template_dev_123!}
    ports:
      - "1433:1433"
    volumes:
      - template-sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null 2>&1 || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  template-sqldata:
