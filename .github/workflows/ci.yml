name: Build & Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Applications/Web/package-lock.json

      - name: Install frontend dependencies
        working-directory: Applications/Web
        run: npm ci

      - name: Restore solution
        run: dotnet restore {{ProjectName}}.slnx

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Build solution
        run: dotnet build {{ProjectName}}.slnx --configuration Release --no-restore

      - name: Test API project
        run: dotnet test Tests/Api.Tests/Api.Tests.csproj --configuration Release --no-build --collect "XPlat Code Coverage" --settings coverlet.runsettings --results-directory TestResults/ --logger "trx;LogFileName=api-tests.trx"

      - name: Test shared services
        run: dotnet test Tests/Shared.Tests/Shared.Tests.csproj --configuration Release --no-build --collect "XPlat Code Coverage" --settings coverlet.runsettings --results-directory TestResults/ --logger "trx;LogFileName=shared-tests.trx"

      - name: Test Web project
        run: dotnet test Tests/Web.Tests/Web.Tests.csproj --configuration Release --no-build --collect "XPlat Code Coverage" --settings coverlet.runsettings --results-directory TestResults/ --logger "trx;LogFileName=web-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
          if-no-files-found: warn

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: TestResults/
          fail_ci_if_error: false
